{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BookLeaf AI Support</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/">BookLeaf AI</a>
        <nav class="nav">
            <a href="/" class="{% if request.resolver_match.url_name == 'chat_page' %}active{% endif %}">Chat</a>
            <a href="/identity/" class="{% if request.resolver_match.url_name == 'identity_page' %}active{% endif %}">Identity</a>
            <a href="/logs/" class="{% if request.resolver_match.url_name == 'logs_page' %}active{% endif %}">Logs</a>
        </nav>
    </header>
    <main class="shell">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
