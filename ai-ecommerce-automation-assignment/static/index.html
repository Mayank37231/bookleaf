<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eCommerce AI Automation POC</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="toolbar">
      <div>
        <p class="eyebrow">Shopify / eCommerce automation</p>
        <h1>AI Support Workflow Console</h1>
      </div>
      <button id="loadDemo">Run demo tickets</button>
    </section>

    <section class="workspace">
      <form id="ticketForm" class="panel">
        <h2>Analyze a ticket</h2>
        <label>
          Customer email
          <input id="email" type="email" value="maya@example.com">
        </label>
        <label>
          Message
          <textarea id="message" rows="6">Where is my order BL-1001? It was supposed to arrive this week.</textarea>
        </label>
        <button type="submit">Analyze workflow</button>
      </form>

      <section class="panel output-panel">
        <h2>Automation output</h2>
        <div id="output" class="results"></div>
      </section>
    </section>
  </main>
  <script src="/static/main.js"></script>
</body>
</html>
